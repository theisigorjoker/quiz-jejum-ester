<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a0533 0%,#2d0a4e 40%,#1a0533 100%);min-height:100vh;padding:1.5rem 1rem 3rem}

/* PARTICLES */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,200,255,.4);animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}

#app{max-width:580px;margin:0 auto;position:relative;z-index:1}

/* TYPOGRAPHY */
.playfair{font-family:'Playfair Display',serif}
.eyebrow{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#E8B4FF;font-weight:600;margin-bottom:.6rem}
.h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.3;color:#FFF8FF}
.h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;line-height:1.35;color:#FFF8FF}
.h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;line-height:1.4;color:#FFF8FF}
.body{font-size:14px;color:#D4B8E8;line-height:1.75}
.body-light{font-size:14px;color:#F0E6FF;line-height:1.75}

/* GLASS CARD */
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,200,255,.15);border-radius:20px}

/* PROGRESS */

.prog-label{font-size:11px;color:#C4A0E0;letter-spacing:.05em}

/* OPTIONS */

.opt.sel{border:1.5px solid #C084FC;background:rgba(192,132,252,.2);color:#FFF8FF;transform:translateX(4px)}

.opt.sel .opt-num{background:#C084FC;color:#fff;border-color:#C084FC;box-shadow:0 0 12px rgba(192,132,252,.5)}

/* BUTTONS */

.btn-back:hover{background:rgba(255,255,255,.05);border-color:rgba(192,132,252,.4)}
.btn-next{background:linear-gradient(135deg,#9333EA,#C084FC,#E879F9);color:#fff;border:none;border-radius:12px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-left:auto;box-shadow:0 4px 20px rgba(147,51,234,.4);font-family:'Inter',sans-serif;letter-spacing:.02em}
.btn-next:disabled{opacity:.3;cursor:default;box-shadow:none}
.btn-next:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(147,51,234,.5)}
.btn-full{width:100%;background:linear-gradient(135deg,#9333EA,#C084FC,#E879F9);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(147,51,234,.4);transition:all .2s;font-family:'Playfair Display',serif;letter-spacing:.03em;position:relative;overflow:hidden}

/* LOADING */

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,132,252,.4)}50%{box-shadow:0 0 0 20px rgba(192,132,252,0)}}

/* RESULT */

/* DOR/SOL BLOCKS */
.dor-block{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:1.25rem;margin-bottom:1rem}

/* WHATS INCLUDED */
.includes-block{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.2);border-radius:16px;padding:1.25rem;margin-bottom:1rem}

.include-icon{width:36px;height:36px;border-radius:10px;background:rgba(192,132,252,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.include-name{font-size:14px;font-weight:600;color:#F0E6FF;margin-bottom:2px}
.include-desc{font-size:12px;color:#A87BC8;line-height:1.5}
.include-bonus{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;letter-spacing:.05em}

/* TESTIMONIALS */
.test-block{background:rgba(255,255,255,.04);border:1px solid rgba(255,200,255,.1);border-radius:14px;padding:14px 16px;margin-bottom:.75rem}

.test-name{font-size:13px;font-weight:600;color:#F0E6FF}
.test-city{font-size:11px;color:#A87BC8}
.stars{color:#F59E0B;font-size:13px;margin-bottom:.4rem}
.test-text{font-size:13px;font-style:italic;color:#D4B8E8;line-height:1.65;font-family:'Playfair Display',serif}

/* TIMER */
.timer-bar{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.08));border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:12px 16px;margin-bottom:1rem;text-align:center}
.timer-label{font-size:11px;color:#FCA5A5;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem}
.timer-digits{display:flex;justify-content:center;gap:8px;align-items:center}
.timer-block{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:6px 10px;min-width:48px;text-align:center}
.timer-num{font-size:22px;font-weight:700;color:#FFF;font-family:'Playfair Display',serif;line-height:1}

.timer-sep{color:#FCA5A5;font-size:18px;font-weight:700;margin-top:-6px}

/* SCARCITY */
.scarcity-bar{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:12px;padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.scarcity-icon{font-size:18px}

/* OFFER BOX */
.offer-box{background:linear-gradient(135deg,rgba(147,51,234,.15),rgba(192,132,252,.08));border:2px solid rgba(192,132,252,.35);border-radius:20px;padding:1.5rem;text-align:center;margin-bottom:1rem;box-shadow:0 8px 40px rgba(147,51,234,.2),inset 0 1px 0 rgba(255,255,255,.05)}
.offer-tag{display:inline-block;background:linear-gradient(135deg,#EF4444,#F97316);color:#fff;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:.75rem;letter-spacing:.08em;box-shadow:0 4px 12px rgba(239,68,68,.3)}
.offer-h{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#F0E6FF;margin-bottom:.5rem;line-height:1.35}
.price-old{font-size:13px;color:#A87BC8;text-decoration:line-through;margin-bottom:2px}
.price-new{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:#FFF;line-height:1;text-shadow:0 0 20px rgba(192,132,252,.5)}
.price-inst{font-size:13px;color:#C084FC;margin-bottom:1rem;margin-top:4px}
.guarantee-text{font-size:12px;color:#A87BC8;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:.5rem}
.security-row{display:flex;justify-content:center;gap:1.25rem;flex-wrap:wrap;margin-top:.75rem}

/* SEPARATOR */
.sep{height:1px;background:rgba(255,200,255,.08);margin:1.25rem 0}

/* MORE TESTS */

/* FLOATING HEARTS */

/* LIVE BADGE */

<body>

<div class="particles" id="particles"></div>

<div id="app">
  <div class="glass" style="padding:1.5rem 1.25rem;margin-bottom:.5rem">
    <div id="screen"></div>
  </div>
</div>

<script>
const CHECKOUT = "https://pay.cakto.com.br/39ua6rn";

// Particles
(function(){
  const p = document.getElementById('particles');
  for(let i=0;i<20;i++){
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;opacity:${.2+Math.random()*.4}`;
    p.appendChild(el);
  }
})();

// Timer
let timerInterval = null;
function startTimer(endTime) {
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const now = Date.now();
    const diff = Math.max(0, endTime - now);
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    const el = document.getElementById('timer-display');
    if(el) {
      el.innerHTML = `
        <div class="timer-block"><div class="timer-num">${String(h).padStart(2,'0')}</div><div class="timer-unit">horas</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-block"><div class="timer-num">${String(m).padStart(2,'0')}</div><div class="timer-unit">min</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-block"><div class="timer-num">${String(s).padStart(2,'0')}</div><div class="timer-unit">seg</div></div>`;
    }
    if(diff===0) clearInterval(timerInterval);
  }, 1000);
}

// Viewers simulation
let viewers = 847 + Math.floor(Math.random()*200);
setInterval(() => {
  viewers += Math.floor(Math.random()*5) - 2;
  viewers = Math.max(600, Math.min(1200, viewers));
  const el = document.getElementById('viewer-count');
  if(el) el.textContent = viewers.toLocaleString('pt-BR');
}, 3000);

const questions = [
  {phase:"Sua realidade",q:"Quando você acorda de manhã, qual é o primeiro sentimento que toma conta de você?",sub:"Seja completamente honesta. Isso vai revelar onde está o seu bloqueio espiritual.",opts:["Um peso no coração que não tem nome — uma angústia constante","Ansiedade — minha mente já começa a correr antes de eu levantar da cama","Vazio e sem direção — acordo sem energia, sem propósito e sem ânimo","Esperança misturada com medo de que nada vai realmente mudar"],vals:["peso","ansiosa","vazio","esperanca"]},
  {phase:"Sua realidade",q:"Qual dessas frases faz o seu coração apertar quando você lê?",sub:"Não pense muito. A primeira reação é a mais verdadeira.",opts:["'Eu oro, jejuo, leio a Bíblia... e nada muda. Estou exausta de tentar.'","'Meu casamento está frio. Me sinto sozinha dentro da minha própria casa.'","'Sinto que Deus está em silêncio. Como se Ele não estivesse me ouvindo.'","'Tenho um chamado, mas não sei qual é. E o tempo está passando.'"],vals:["exausta","casamento","silencio","chamado"]},
  {phase:"Sua realidade",q:"Há quanto tempo você carrega esse peso?",opts:["Faz meses — já me acostumei a viver assim, mas estou cada vez mais cansada","Faz anos — já não sei mais como era diferente, é como se sempre foi assim","Começou recentemente, mas tomou conta de tudo muito rápido","É um ciclo — melhora um pouco e volta tudo. Não consigo sair disso."],vals:["meses","anos","recente","ciclo"]},

function pick(i){
  const q=questions[cur];answers[cur]=q.vals[i];
  document.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
  document.querySelectorAll(".opt")[i].classList.add("sel");
  const bn=document.getElementById("bn");if(bn)bn.disabled=false;
}
function nextQ(){
  if(answers[cur]===undefined)return;cur++;
  if(cur===3){step="t1";render();scroll();return}
  if(cur===5){step="t2";render();scroll();return}
  if(cur>=questions.length){step="loading";render();scroll();return}
  step="q";render();scroll();
}
function goBack(){if(cur>0){cur--;step="q";render();scroll()}}
function afterTrans(){step="q";render();scroll()}
function go(s){step=s;render();scroll()}
